<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo List</title>
</head>
<body>
    <header>
        <h1>ToDo List</h1>
    </header>
    <div id="main-content">
        <form id="project-form">
            <div class="fields">
                <div class="field">
                    <label for="title">*Title: </label>
                    <input type="text" name="title" placeholder="Project Title" required>
                </div>
                <div class="field">
                    <label for="description">*Description: </label>
                    <input type="text" name="description" placeholder="Project description" required>
                </div>
                <div class="field">
                    <label for="dueDate">*Date: </label>
                    <input type="date" name="dueDate" placeholder="Project due date" required>
                </div>
                <div class="field">
                    <label for="priority">*Priority: </label>
                    <select name="priority" required>
                        <option value="high">High</option>
                        <option value="medium">Medium</option>
                        <option value="low" selected>Low</option>
                    </select>
                </div>
                <div class="field">
                    <label for="steps[]">*Step: </label>
                    <input type="text" name="steps[]" placeholder="Project Step" required>
                </div>
            </div>

            <div class="form-buttons">
                <button type="submit">Create Project</button>
                <button type="button" id="add-step">Add Step</button>
            </div>
        </form>
        <details class="project" open>
            <summary>Test Project</summary>
            <p>Project Description</p>
            <ul>
                <li>Item 1</li>
                <li>
                    Item 2
                    <ul>
                        <li>nested 1</li>
                        <li>nested 2</li>
                    </ul>
                </li>
                <li>Item 3</li>
            </ul>
        </details>
    </div>
</body>
</html>
